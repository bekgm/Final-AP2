syntax = "proto3";

package messaging;

option go_package = "github.com/bekgm/Final-AP2/pkg/messaging;messaging";

service MessagingService {
  rpc SendMessage (SendMessageRequest) returns (SendMessageResponse);
  rpc GetMessages (GetMessagesRequest) returns (GetMessagesResponse);
  rpc GetDialogs (GetDialogsRequest) returns (GetDialogsResponse);
}

message Message {
  string id = 1;
  string sender_id = 2;
  string receiver_id = 3;
  string project_id = 4;
  string content = 5;
  string timestamp = 6;
}

message Dialog {
  string other_user_id = 1;
  string project_id = 2;
  Message last_message = 3;
  int32 unread_count = 4;
}

message SendMessageRequest {
  string sender_id = 1;
  string receiver_id = 2;
  string project_id = 3;
  string content = 4;
}

message SendMessageResponse {
  Message message = 1;
}

message GetMessagesRequest {
  string user_id_1 = 1;
  string user_id_2 = 2;
  string project_id = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message GetMessagesResponse {
  repeated Message messages = 1;
}

message GetDialogsRequest {
  string user_id = 1;
}

message GetDialogsResponse {
  repeated Dialog dialogs = 1;
}
