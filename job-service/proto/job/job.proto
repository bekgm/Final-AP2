syntax = "proto3";

package job;

option go_package = "github.com/bekgm/Final-AP2/job-service/proto/job";

import "google/protobuf/timestamp.proto";

// Enums

enum JobStatus {
  JOB_STATUS_UNSPECIFIED  = 0;
  JOB_STATUS_OPEN         = 1;
  JOB_STATUS_IN_PROGRESS  = 2;
  JOB_STATUS_CLOSED       = 3;
}

enum ApplicationStatus {
  APPLICATION_STATUS_UNSPECIFIED = 0;
  APPLICATION_STATUS_PENDING     = 1;
  APPLICATION_STATUS_ACCEPTED    = 2;
  APPLICATION_STATUS_REJECTED    = 3;
}

// Messages

message Job {
  string                    id           = 1;
  string                    client_id    = 2;
  string                    title        = 3;
  string                    description  = 4;
  double                    budget       = 5;
  JobStatus                 status       = 6;
  google.protobuf.Timestamp created_at   = 7;
  google.protobuf.Timestamp updated_at   = 8;
}

message Application {
  string                    id             = 1;
  string                    job_id         = 2;
  string                    freelancer_id  = 3;
  string                    cover_letter   = 4;
  ApplicationStatus         status         = 5;
  google.protobuf.Timestamp created_at     = 6;
}

// CreateJob

message CreateJobRequest {
  string client_id   = 1;
  string title       = 2;
  string description = 3;
  double budget      = 4;
}

message CreateJobResponse {
  Job job = 1;
}

//GetJob

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  Job job = 1;
}

// ListJobs

message ListJobsRequest {
  int32  page      = 1;
  int32  page_size = 2;
  string client_id = 3; // optional filter
}

message ListJobsResponse {
  repeated Job jobs  = 1;
  int32        total = 2;
}

// ApplyToJob

message ApplyToJobRequest {
  string job_id        = 1;
  string freelancer_id = 2;
  string cover_letter  = 3;
}

message ApplyToJobResponse {
  Application application = 1;
}

//AcceptFreelancer

message AcceptFreelancerRequest {
  string job_id         = 1;
  string application_id = 2;
}

message AcceptFreelancerResponse {
  Job         job         = 1;
  Application application = 2;
}

// ListApplications

message ListApplicationsRequest {
  string job_id = 1;
}

message ListApplicationsResponse {
  repeated Application applications = 1;
}

message CompleteJobRequest {
  string job_id = 1;
}

message CompleteJobResponse {
  Job job = 1;
}

// Service 
service JobService {
  rpc CreateJob        (CreateJobRequest)        returns (CreateJobResponse);
  rpc GetJob           (GetJobRequest)           returns (GetJobResponse);
  rpc ListJobs         (ListJobsRequest)         returns (ListJobsResponse);
  rpc ApplyToJob       (ApplyToJobRequest)       returns (ApplyToJobResponse);
  rpc AcceptFreelancer (AcceptFreelancerRequest) returns (AcceptFreelancerResponse);
  rpc ListApplications (ListApplicationsRequest) returns (ListApplicationsResponse);
  rpc CompleteJob      (CompleteJobRequest)      returns (CompleteJobResponse);
}
