syntax = "proto3";

package user;

option go_package = "github.com/freelance-market/user-service/proto/user";

service UserService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
}

// Enums
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_CLIENT = 1;
  ROLE_FREELANCER = 2;
}

// Messages
message User {
  string id = 1;
  string email = 2;
  string name = 3;
  Role role = 4;
  string bio = 5;
  repeated string skills = 6;
  string avatar_url = 7;
  string created_at = 8;
  string updated_at = 9;
}

// Register
message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
  Role role = 4;
}

message RegisterResponse {
  string token = 1;
  User user = 2;
}

// Login
message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  User user = 2;
}

// GetUser
message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

// UpdateUser
message UpdateUserRequest {
  string user_id = 1;
  optional string name = 2;
  optional string bio = 3;
  repeated string skills = 4;
  optional string avatar_url = 5;
}

message UpdateUserResponse {
  User user = 1;
}
