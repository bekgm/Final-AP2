version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: userservice
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_create_users.sql:/docker-entrypoint-initdb.d/001_create_users.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: .
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: "50051"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: userservice
      DB_SSLMODE: disable
      JWT_SECRET: "dev-secret-change-in-production"
      JWT_EXPIRATION_HOURS: "72"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
